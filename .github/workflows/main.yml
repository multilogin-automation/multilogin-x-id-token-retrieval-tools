name: Daily Maintenance (Stealth Mode)

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *' # Cứ 6 tiếng quét một lần, nhưng xác suất làm việc thấp
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smart Refactor Logic
        id: bot_logic
        run: |
          python3 -c "
          import os, random, re, datetime

          # 1. Xác suất làm việc cực thấp (20%) để tránh bị soi
          if random.random() > 0.2:
              print('SKIP=true')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f: f.write('skip=true\n')
              exit(0)

          with open('README.md', 'r', encoding='utf-8') as f:
              lines = f.readlines()

          # 2. Xử lý đổi ngày Badge (Vẫn giữ để SEO)
          current_date = datetime.datetime.now().strftime('%Y--%m--%d')
          for i, line in enumerate(lines):
              if 'Last_Pulse-' in line:
                  lines[i] = re.sub(r'Last_Pulse-.*?-blue', f'Last_Pulse-{current_date}-blue', line)

          # 3. TRÁO ĐỔI VỊ TRÍ (Human-like): Tìm các dòng bắt đầu bằng '-' (list) và tráo đổi ngẫu nhiên 2 dòng
          list_indices = [i for i, l in enumerate(lines) if l.strip().startswith('- ')]
          if len(list_indices) >= 2:
              idx1, idx2 = random.sample(list_indices, 2)
              lines[idx1], lines[idx2] = lines[idx2], lines[idx1]

          # 4. RANDOM COMMIT MESSAGE
          msgs = ['docs: update technical tips', 'chore: maintenance', 'docs: minor refactor', 'style: fix formatting']
          msg = random.choice(msgs)

          with open('README.md', 'w', encoding='utf-8') as f:
              f.writelines(lines)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'skip=false\ncommit_msg={msg}\n')
          "

      - name: Push Changes
        if: steps.bot_logic.outputs.skip == 'false'
        run: |
          git config --local user.email "dev-support@adblogin.com"
          git config --local user.name "mlx-automation-core"
          git add README.md
          git commit -m "${{ steps.bot_logic.outputs.commit_msg }} [skip ci]" || echo "No changes"
          git push
