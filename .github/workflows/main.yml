name: Daily System Pulse

permissions:
  contents: write

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

jobs:
  update-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Pulse Date
        run: |
          CURRENT_DATE=$(date -u +"%Y-%m-%d")
          # CHỐT HẠ: Chỉ thay thế nội dung nằm giữa 2 thẻ comment, KHÔNG đụng đến chỗ khác
          sed -i "s/\(\).*\(\)/\1$CURRENT_DATE\2/g" README.md

      - name: Commit and Push Changes
        run: |
          git config --local user.email "bot@adblogin.com"
          git config --local user.name "multilogin-automation-bot"
          git add README.md
          git commit -m "chore: daily system pulse update $CURRENT_DATE [skip ci]" || echo "No changes to commit"
          git push
