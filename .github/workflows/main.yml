name: Flagship Maintenance (Nuclear Stealth)

permissions:
  contents: write

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decrypt and Execute Logic
        id: bot_logic
        run: |
          # Đây là code Python đã được mã hóa để GitHub không thể "nhai" mất chữ của sếp
          echo "_" | base64 -d > update_script.py
          
          # Chạy script và lấy message commit
          MSG=$(python3 update_script.py)
          echo "commit_msg=$MSG" >> $GITHUB_OUTPUT

      - name: Push Changes
        run: |
          git config --local user.email "support@adblogin.com"
          git config --local user.name "ADB-Automation-Bot"
          git add README.md
          git commit -m "${{ steps.bot_logic.outputs.commit_msg }} [skip ci]" || echo "No changes"
          git push
